<!DOCTYPE html>
<html lang="ca">

<head>

<meta charset="UTF-8">

<!-- CRÍTIC per iPhone -->
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{ page.title }}</title>

<link rel="stylesheet" href="/css/main.css">

<style>

/* Reset estable */
* {
    box-sizing: border-box;
}

/* Evita desplaçaments laterals */
html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    width: 100%;
}

/* Contenidor centrat real */
.container {
    max-width: 850px;
    margin-left: auto;
    margin-right: auto;
    padding: 1rem;
    width: 100%;
}

/* Tipografia llegible */
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    color: #2f2f2f;
}

/* Imatges sempre correctes */
img {
    max-width: 100%;
    height: auto;
    display: block;
}

/* Evita overflow inesperat */
iframe,
table,
pre {
    max-width: 100%;
}

/* ===== Navegació ordinador ===== */

nav {
    background: #f5f5f5;
    border-bottom: 1px solid #e5e5e5;
    padding: 0.7rem 0;
    width: 100%;
}

nav ul {
    list-style: none;
    margin: 0;
    padding: 0;

    display: flex;
    justify-content: center;
    gap: 2rem;
    flex-wrap: wrap;   /* ← IMPORTANT */
}

nav li {
    min-width: 0;      /* ← IMPORTANT */
}

nav a {
    text-decoration: none;
    color: #333;
    font-weight: 500;
}


/* ===== Footer ===== */

footer {
    margin-top: 3rem;
    padding: 1rem;
    text-align: center;
    background: #f5f5f5;
    width: 100%;
}

footer ul {
    list-style: none;
    padding: 0;
}

footer li {
    display: inline;
    margin: 0 10px;
}


/* ===== MÒBIL ===== */

@media (max-width:700px) {

.container {
    padding: 0.8rem;
}

/* Menú adaptat a dit */

nav ul {
    gap: 0.4rem;
}

nav li {
    flex: 1 1 45%;
    text-align: center;
}

nav a {
    display: block;
    padding: 0.4rem;
    background: white;
    border-radius: 6px;
}

}


/* ===== HERO TEXT (PORTADA) ===== */

.hero-text {
    text-align: center;
    margin-top: 30px;
}

.hero-text h2 {
    font-size: 1.8rem;
    margin-bottom: 10px;
}

.hero-text p {
    font-size: 1.2rem;
}


</style>

</head>

<body>

<nav>
<ul>

<li><a href="/">Home</a></li>

<li><a href="/atencio">Atenció Psicològica</a></li>

<li><a href="/xerrades">Activitats</a></li>

<li><a href="/cv">CV i Trajectòria</a></li>

<li><a href="/pubs">Publicacions</a></li>

</ul>
</nav>


<div class="container">

{{ content }}

</div>

</ul>

</footer>

</body>
</html>
