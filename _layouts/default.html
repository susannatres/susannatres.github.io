<!DOCTYPE html>
<html lang="ca">
<head>

<meta charset="UTF-8">

<!-- IMPORTANT per mòbil -->
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{ page.title }}</title>

<link rel="stylesheet" href="/css/main.css">

<style>

/* Amplada llegible */
.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1rem;
}

/* Tipografia */
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    color: #2f2f2f;
    margin: 0;
}

/* Navegació normal (ordinador) */

nav {
    background: #f5f5f5;
    padding: 0.7rem 0;
    border-bottom: 1px solid #e5e5e5;
}

nav ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    gap: 2rem;
}

nav a {
    text-decoration: none;
    color: #333;
    font-weight: 500;
}

/* Imatges mai deformades */

img {
    max-width: 100%;
    height: auto;
}

/* Footer */

footer {
    margin-top: 3rem;
    padding: 1rem;
    text-align: center;
    background: #f5f5f5;
}

footer ul {
    list-style: none;
    padding: 0;
}

footer li {
    display: inline;
    margin: 0 10px;
}


/* ===== MÒBIL ===== */

@media (max-width: 700px) {

.container {
    padding: 0.8rem;
}

/* Menú compacte */

nav ul {
    flex-wrap: wrap;
    gap: 0.4rem;
}

nav li {
    flex: 1 1 45%;
    text-align: center;
}

nav a {
    display: block;
    padding: 0.4rem;
    background: white;
    border-radius: 6px;
}

}

</style>


</head>

<body>

<nav>
<ul>
<li><a href="/">Home</a></li>
<li><a href="/atencio">Atenció Psicològica</a></li>
<li><a href="/xerrades">Activitats</a></li>
<li><a href="/cv">CV i Trajectòria</a></li>
<li><a href="/pubs">Publicacions</a></li>
</ul>
</nav>

<div class="container">

{{ content }}

</div>

<footer>
<ul>
<li><a href="mailto:trescoca@gmail.com">email</a></li>
<li><a href="https://github.com/susannatres">github.com/susannatres</a></li>
</ul>
</footer>

</body>
</html>
